name: Protocol Integration Test Harness

on:
  push:
    branches: [main, develop, feat/protocol-integration-test-harness-*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  protocol-integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - name: "Cross-Contract Vault Flows"
            path: "tests/integration/protocol/cross-contract-vault.test.ts"
          - name: "Multi-Asset Protocol Workflows"
            path: "tests/integration/protocol/multi-asset.test.ts"
          - name: "Governance & Parameter Integration"
            path: "tests/integration/protocol/governance-parameter.test.ts"
          - name: "Failure Scenarios"
            path: "tests/integration/scenarios/failure.test.ts"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build:contracts

      - name: Setup Docker test environment
        run: |
          docker system prune -f || true
          docker network create protocol-test-network || true

      - name: Run ${{ matrix.suite.name }}
        run: |
          npx vitest run --config vitest.integration.config.ts ${{ matrix.suite.path }}
        continue-on-error: false
        env:
          TEST_NODE_HOST: localhost
          TEST_NODE_PORT: 50051

      - name: Collect test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-integration-results-${{ matrix.suite.name }}
          path: |
            test-results.json
            test-output.log
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error ::Protocol integration test suite '${{ matrix.suite.name }}' failed"

  comprehensive-protocol-suite:
    needs: protocol-integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build:contracts

      - name: Run full protocol integration suite
        run: |
          npx vitest run --config vitest.integration.config.ts \
            tests/integration/protocol/ \
            tests/integration/scenarios/
        continue-on-error: false
        env:
          TEST_NODE_HOST: localhost
          TEST_NODE_PORT: 50051

      - name: Generate coverage report
        if: success()
        run: |
          echo "Protocol Integration Test Harness - Coverage Summary"
          echo "===================================================="
          echo "✓ Cross-contract vault interactions"
          echo "✓ Multi-asset protocol workflows"
          echo "✓ Governance & parameter upgrades"
          echo "✓ Failure scenario coverage"
          echo "✓ Replay attack protection"
          echo "✓ Concurrent operation handling"

      - name: Upload comprehensive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-protocol-results
          path: |
            test-results.json
            test-coverage.json
          if-no-files-found: ignore

  cleanup:
    needs: [protocol-integration-tests, comprehensive-protocol-suite]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Cleanup Docker resources
        run: |
          docker system prune -af || true
          docker network rm protocol-test-network || true
